name: Build and Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build site
        run: node build.mjs
      - name: Generate and render social graphics
        run: |
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          node tools/gen-social.mjs
          mkdir -p dist/assets/social
          shopt -s nullglob
          for f in assets/social/*.svg; do
            name=$(basename "$f" .svg)
            rsvg-convert -w 1080 -h 1350 "$f" -o "dist/assets/social/$name.png"
          done
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          cname: capitaldecoded.com
